<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SubTrack | Manage Your Subscriptions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-r from-teal-100 via-emerald-50 to-orange-100 flex items-center justify-center">

  <!-- Main Card -->
  <div class="bg-white rounded-3xl shadow-2xl p-10 max-w-md w-full transform hover:scale-105 transition-transform duration-300">

    <!-- App Name -->
    <div class="text-center mb-6">
      <h1 class="text-4xl font-extrabold text-teal-600 tracking-wide drop-shadow-md">SubTrack</h1>
      <p class="text-slate-700 mt-2 text-lg">
        Manage all your subscriptions in one place
      </p>
    </div>

    <!-- Buttons -->
    <div class="space-y-4">
      <a href="/login"
         class="block text-center bg-teal-600 text-white py-3 rounded-xl font-semibold shadow-md hover:bg-teal-700 hover:shadow-lg transition">
        Login
      </a>

      <a href="/register"
         class="block text-center border-2 border-orange-500 text-orange-500 py-3 rounded-xl font-semibold hover:bg-orange-50 hover:scale-105 transition">
        Register
      </a>
    </div>

    <!-- Divider -->
    <div class="flex items-center my-6">
      <div class="flex-grow border-t border-slate-300"></div>
      <span class="px-3 text-sm text-teal-500 font-medium">simple • secure • smart</span>
      <div class="flex-grow border-t border-slate-300"></div>
    </div>

    <!-- Footer Text -->
    <p class="text-center text-sm text-slate-700">
      Track Netflix, Spotify, Prime & more  
      <br>
      Never miss a renewal again.
    </p>

    <!-- Small Decorative Icons -->
    <div class="flex justify-center mt-6 space-x-4 text-teal-500">
      <i class="fa-brands fa-netflix fa-lg"></i>
      <i class="fa-brands fa-spotify fa-lg"></i>
      <i class="fa-brands fa-amazon fa-lg"></i>
    </div>

  </div>

  <!-- Font Awesome -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

</body>
</html>
