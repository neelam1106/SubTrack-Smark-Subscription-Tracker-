<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SubTrack - Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-r from-teal-100 via-emerald-50 to-orange-100 min-h-screen flex items-center justify-center py-10">

  <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md transform hover:scale-102 transition-transform duration-300">

    <!-- Logo/Header -->
    <div class="text-center mb-8">
      <img 
        src="assets/logo.webp" 
        alt="SubTrack Logo"
        class="w-24 h-16 mx-auto rounded-full mb-4"
      >
      <h1 class="text-3xl font-bold text-teal-600">Reset Password</h1>
      <p class="text-gray-600">Enter your new password</p>
    </div>

    <!-- Reset Password Form -->
    <form id="resetPasswordForm" class="space-y-6">
      <div id="alertContainer"></div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
        <div class="relative">
          <input type="password" id="password" name="password" required minlength="6"
                 class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition duration-200 bg-white text-gray-900"
                 placeholder="Enter new password">
          <button type="button" onclick="togglePassword('password')" class="absolute right-3 top-3.5 text-gray-400 hover:text-gray-600">
            <i id="password-toggle" class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <div>
        <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-2">Confirm New Password</label>
        <div class="relative">
          <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6"
                 class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition duration-200 bg-white text-gray-900"
                 placeholder="Confirm new password">
          <button type="button" onclick="togglePassword('confirmPassword')" class="absolute right-3 top-3.5 text-gray-400 hover:text-gray-600">
            <i id="confirmPassword-toggle" class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" id="resetPasswordBtn"
              class="w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition duration-200 focus:ring-2 focus:ring-teal-500 focus:ring-offset-2">
        Reset Password
      </button>
    </form>

    <!-- Back to Login -->
    <div class="text-center mt-6">
      <p class="text-gray-600">
        <a href="/" class="text-teal-600 hover:text-teal-700 font-medium">Back to Login</a>
      </p>
    </div>

  </div>

  <script>
    function togglePassword(inputId) {
      const input = document.getElementById(inputId);
      const toggle = document.getElementById(inputId + '-toggle');

      if (input.type === 'password') {
        input.type = 'text';
        toggle.classList.remove('fa-eye');
        toggle.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        toggle.classList.remove('fa-eye-slash');
        toggle.classList.add('fa-eye');
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('resetPasswordForm').addEventListener('submit', handleResetPassword);
    });

    async function handleResetPassword(e) {
      e.preventDefault();
      
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        showAlert('Passwords do not match', 'error');
        return;
      }

      const token = new URLSearchParams(window.location.search).get('token');
      if (!token) { showAlert('Invalid reset link', 'error'); return; }

      try {
        const button = document.getElementById('resetPasswordBtn');
        button.disabled = true;
        button.textContent = 'Resetting...';

        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const result = await res.json();

        if (res.ok) {
          showAlert('Password reset successfully! Redirecting...', 'success');
          setTimeout(() => window.location.href = '/', 2000);
        } else {
          showAlert(result.message || 'Failed to reset password', 'error');
        }
      } catch {
        showAlert('Network error occurred. Please try again.', 'error');
      } finally {
        const button = document.getElementById('resetPasswordBtn');
        button.disabled = false;
        button.textContent = 'Reset Password';
      }
    }

    function showAlert(message, type) {
      const container = document.getElementById('alertContainer');
      const alertClass = type === 'success'
        ? 'bg-green-100 border-green-400 text-green-700'
        : 'bg-red-100 border-red-400 text-red-700';
      
      container.innerHTML = `
        <div class="${alertClass} border px-4 py-3 rounded-xl mb-4 flex items-center gap-3">
          <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
          <p class="text-sm">${message}</p>
        </div>
      `;

      setTimeout(() => { container.innerHTML = ''; }, 5000);
    }
  </script>

</body>
</html>
