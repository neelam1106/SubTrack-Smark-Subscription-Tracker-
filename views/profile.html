<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile | SubTrack</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-teal-100 via-emerald-50 to-orange-100 min-h-screen flex items-center justify-center py-10">

  <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-lg transform hover:scale-102 transition-transform duration-300">

    <h2 class="text-2xl font-bold text-teal-600 mb-6 text-center">Profile</h2>

    <!-- Profile Image -->
    <div class="flex flex-col items-center mb-6">
      <img
        id="profilePreview"
        src="assets/default-avatar.png"
        class="w-32 h-32 rounded-full object-cover border-2 border-teal-200 mb-3"
        alt="Profile Image"
      />
      <input
        type="file"
        id="profileImage"
        accept="image/*"
        class="text-sm"
      />
    </div>

    <!-- Profile Form -->
    <form id="profileForm" class="space-y-4">
      
      <input
        type="text"
        id="firstName"
        placeholder="First Name"
        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition duration-200"
        required
      />

      <input
        type="text"
        id="lastName"
        placeholder="Last Name"
        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition duration-200"
        required
      />

      <input
        type="email"
        id="email"
        class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-100 cursor-not-allowed"
        disabled
      />

      <button
        type="submit"
        class="w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition duration-200 focus:ring-2 focus:ring-teal-500 focus:ring-offset-2"
      >
        Update Profile
      </button>
    </form>

    <a href="/dashboard" class="block text-center mt-4 text-teal-600 hover:text-teal-700 font-medium">
      ← Back to Dashboard
    </a>

  </div>

  <script src="/js/profile.js"></script>
</body>
</html>
