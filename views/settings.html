<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubTrack - Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gradient-to-r from-teal-100 via-emerald-50 to-orange-100 min-h-screen">

    <!-- Main Wrapper -->
    <div class="max-w-2xl mx-auto px-4 space-y-8">

        <!-- Header -->
          <div class="flex justify-between items-center bg-white rounded-2xl shadow-2xl p-6 w-full">
            <div class="flex items-center space-x-4">
                <img src="assets/logo.webp" alt="SubTrack Logo" class="w-12 h-12 rounded-full">
                <h1 class="text-2xl font-bold text-teal-700">Settings</h1>
            </div>
            <a href="/dashboard" class="px-4 py-2 bg-teal-600 hover:bg-teal-700 text-white rounded-xl flex items-center transition duration-200">
                <i class="fas fa-arrow-left mr-2"></i> Back to Dashboard
            </a>
        </div>

        <!-- Profile Settings -->
        <div class="bg-white rounded-2xl shadow-lg p-6">
            <h2 class="text-xl font-semibold text-teal-700 mb-6">Profile Settings</h2>

            <form id="profileForm" class="space-y-4">
                <div id="profileAlert"></div>

                <input
                    type="text"
                    id="firstName"
                    name="firstName"
                    placeholder="First Name"
                    required
                    class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-teal-400 focus:border-teal-400"
                />

                <input
                    type="text"
                    id="lastName"
                    name="lastName"
                    placeholder="Last Name"
                    required
                    class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-teal-400 focus:border-teal-400"
                />

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Email Address"
                    required
                    class="w-full px-4 py-3 border rounded-lg bg-gray-100 cursor-not-allowed"
                    disabled
                />

                <button
                    type="submit"
                    class="w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold py-3 rounded-xl transition">
                    Update Profile
                </button>
            </form>
        </div>

        <!-- Notification Settings -->
        <div class="bg-white rounded-2xl shadow-lg p-6">
            <h2 class="text-xl font-semibold text-teal-700 mb-6">Notification Settings</h2>

            <form id="settingsForm" class="space-y-6">
                <div id="settingsAlert"></div>

                <!-- Email Notification Toggle -->
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-lg font-medium text-gray-900">Email Notifications</p>
                        <p class="text-sm text-gray-600">
                            Receive email reminders for upcoming renewals
                        </p>
                    </div>

                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="emailNotifications" class="sr-only peer">
                        <div
                            class="w-11 h-6 bg-gray-200 peer-focus:ring-4 peer-focus:ring-teal-300
                                   rounded-full peer peer-checked:bg-teal-600
                                   after:content-[''] after:absolute after:top-[2px] after:left-[2px]
                                   after:bg-white after:border after:rounded-full after:h-5 after:w-5
                                   after:transition-all peer-checked:after:translate-x-full">
                        </div>
                    </label>
                </div>

                <!-- Reminder Days -->
                <div>
                    <label for="reminderDays" class="block text-sm font-medium text-gray-700 mb-2">
                        Reminder Days Before Renewal
                    </label>
                    <select
                        id="reminderDays"
                        name="reminderDays"
                        class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-teal-400 focus:border-teal-400">
                        <option value="1">1 day</option>
                        <option value="3">3 days</option>
                        <option value="7">7 days</option>
                        <option value="14">14 days</option>
                    </select>
                </div>

                <button
                    type="submit"
                    class="w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold py-3 rounded-xl transition">
                    Save Settings
                </button>
            </form>
        </div>

    </div>

    <script src="js/settings.js"></script>
</body>
</html>
