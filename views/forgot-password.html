<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubTrack - Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-r from-teal-100 via-emerald-50 to-orange-100 min-h-screen flex items-center justify-center py-10">

    <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md transform hover:scale-102 transition-transform duration-300">

        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <img src="assets/logo.webp" alt="SubTrack Logo" class="w-24 h-16 mx-auto rounded-full mb-4">
            <h1 class="text-3xl font-bold text-teal-600 mb-2">Forgot Password</h1>
            <p class="text-gray-700">Enter your email to reset your password</p>
        </div>

        <!-- Forgot Password Form -->
        <form id="forgotPasswordForm" class="space-y-6">
            <div id="alertContainer"></div>
            
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                <div class="relative">
                    <input type="email" id="email" name="email" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition duration-200 bg-white text-gray-900"
                        placeholder="Enter your email address">
                    <i class="fas fa-envelope absolute right-3 top-3.5 text-gray-400"></i>
                </div>
            </div>

            <button type="submit" id="forgotPasswordBtn"
                class="w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition duration-200 focus:ring-2 focus:ring-teal-500 focus:ring-offset-2">
                Send Reset Link
            </button>
        </form>

        <!-- Back to Login -->
        <div class="text-center mt-6">
            <p class="text-gray-700">
                Remember your password? 
                <a href="/" class="text-teal-600 hover:text-teal-700 font-medium">Sign in</a>
            </p>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('forgotPasswordForm').addEventListener('submit', handleForgotPassword);
        });

        async function handleForgotPassword(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const email = formData.get('email');
            const button = document.getElementById('forgotPasswordBtn');
            button.disabled = true;
            button.textContent = 'Sending...';

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const result = await response.json();

                if (response.ok) {
                    showAlert('Password reset link sent to your email!', 'success');
                    e.target.reset();
                } else {
                    showAlert(result.message || 'Failed to send reset link', 'error');
                }
            } catch (error) {
                showAlert('Network error occurred. Please try again.', 'error');
            } finally {
                button.disabled = false;
                button.textContent = 'Send Reset Link';
            }
        }

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alertClass = type === 'success' ? 'bg-green-100 border-green-400 text-green-700' : 'bg-red-100 border-red-400 text-red-700';
            
            container.innerHTML = `
                <div class="${alertClass} border px-4 py-3 rounded-xl mb-4">
                    <div class="flex items-center">
                        <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                        <p class="ml-3 text-sm">${message}</p>
                    </div>
                </div>
            `;
            setTimeout(() => { container.innerHTML = ''; }, 5000);
        }
    </script>
</body>
</html>
