<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us | SubTrack</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-teal-100 via-emerald-50 to-orange-100 min-h-screen flex items-center justify-center py-10">

  <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-lg transform hover:scale-102 transition-transform duration-300">

    <h2 class="text-3xl font-bold text-teal-600 mb-4 text-center drop-shadow-md">
      Contact Us
    </h2>

    <p class="text-gray-700 mb-6 text-center">
      Have a question, feedback, or suggestion? Fill the form below.
    </p>

    <form id="contactForm" class="space-y-5">

      <input
        type="text"
        id="name"
        placeholder="Your Name"
        required
        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition duration-200"
      />

      <input
        type="email"
        id="email"
        placeholder="Your Email"
        required
        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition duration-200"
      />

      <textarea
        rows="5"
        id="message"
        placeholder="Your Message"
        required
        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition duration-200"
      ></textarea>

      <button
        type="submit"
        class="w-full bg-teal-600 text-white py-3 rounded-xl font-semibold shadow-md hover:bg-teal-700 hover:shadow-lg transition duration-200"
      >
        Send Message
      </button>
    </form>

    <a href="/dashboard" 
       class="block text-center mt-6 text-teal-600 font-medium hover:text-teal-700 transition">
       ← Back to Dashboard
    </a>

  </div>

  <!-- SCRIPT -->
  <script>
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();

      try {
        const res = await fetch('/api/messages/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, message })
        });

        const data = await res.json();

        if (res.ok) {
          alert('Message sent successfully!');
          document.getElementById('contactForm').reset();
        } else {
          alert(data.message || 'Something went wrong');
        }
      } catch (error) {
        alert('Server error. Please try again later.');
        console.error(error);
      }
    });
  </script>

</body>
</html>
