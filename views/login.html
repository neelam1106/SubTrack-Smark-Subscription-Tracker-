<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubTrack - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-r from-teal-100 via-emerald-50 to-orange-100 min-h-screen flex items-center justify-center py-10">

    <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md transform hover:scale-102 transition-transform duration-300">

        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <img src="assets/logo.webp" alt="SubTrack Logo" class="w-40 h-24 mx-auto mb-4 rounded-full">
            <h1 class="text-3xl font-bold text-teal-600">SubTrack</h1>
            <p class="text-gray-700">Track your subscriptions effortlessly</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-6">
            <div id="alertContainer"></div>
            
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                <div class="relative">
                    <input type="email" id="email" name="email" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition duration-200 bg-white text-gray-900"
                           placeholder="Enter your email">
                    <i class="fas fa-envelope absolute right-3 top-3.5 text-gray-400"></i>
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <div class="relative">
                    <input type="password" id="password" name="password" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition duration-200 bg-white text-gray-900"
                           placeholder="Enter your password">
                    <button type="button" onclick="togglePassword('password')" class="absolute right-3 top-3.5 text-gray-400 hover:text-gray-600">
                        <i id="password-toggle" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="loginBtn"
                    class="w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition duration-200 focus:ring-2 focus:ring-teal-500 focus:ring-offset-2">
                Sign In
            </button>
        </form>

        <!-- Register & Forgot Password Links -->
        <div class="text-center mt-6 space-y-2">
            <p class="text-gray-700">
                Don't have an account? 
                <a href="/register" class="text-teal-600 hover:text-teal-700 font-medium">Sign up</a>
            </p>
            <p class="text-gray-700">
                <a href="/forgot-password" class="text-teal-600 hover:text-teal-700 font-medium">Forgot your password?</a>
            </p>
        </div>

    </div>

    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const toggle = document.getElementById(inputId + '-toggle');
            if (input.type === 'password') {
                input.type = 'text';
                toggle.classList.remove('fa-eye');
                toggle.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                toggle.classList.remove('fa-eye-slash');
                toggle.classList.add('fa-eye');
            }
        }
    </script>
    <script src="js/auth.js"></script>
</body>
</html>
